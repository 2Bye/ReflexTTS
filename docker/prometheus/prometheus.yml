# Prometheus configuration for ReflexTTS
# Scrapes the /metrics endpoint from the ReflexTTS API

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

# Alertmanager integration (uncomment when Alertmanager is deployed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - "alertmanager:9093"

scrape_configs:
  - job_name: "reflex-tts"
    static_configs:
      - targets: ["reflex-tts:8080"]
    metrics_path: /metrics
    scrape_interval: 10s
